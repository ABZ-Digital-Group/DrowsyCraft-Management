<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark Slate Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Indigo/Violet Accent Gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Neon Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Base App Icon Shape -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Outer Stylized 'D' Curve -->
  <path d="M 180 140 L 260 140 C 340 140 380 190 380 256 C 380 322 340 372 260 372 L 180 372 Z" 
        fill="none" stroke="url(#accent)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
        
  <!-- Straight back of the 'D' -->
  <path d="M 180 140 L 180 372" 
        fill="none" stroke="url(#accent)" stroke-width="52" stroke-linecap="round" filter="url(#glow)"/>
</svg>
